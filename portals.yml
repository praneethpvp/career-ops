# Career-Ops Portal Scanner Configuration — Praneeth Varma
# Customized for: Data Analyst, Analytics Engineer, AI/ML, Data Science roles
# Targeting: Big Tech, AI-first companies, and high-growth startups

title_filter:
  positive:
    - "data analyst"
    - "senior data analyst"
    - "staff data analyst"
    - "product analyst"
    - "analytics engineer"
    - "data scientist"
    - "business intelligence"
    - "BI engineer"
    - "AI analyst"
    - "ML engineer"
    - "machine learning"
    - "analytics lead"
    - "analytics manager"
    - "data engineer"
    - "insights analyst"
    - "fraud analyst"
    - "risk analyst"
    - "growth analyst"
    - "marketing analyst"
    - "applied scientist"
  negative:
    - "intern"
    - "junior"
    - "associate"
    - "entry level"
    - "coordinator"
    - "technician"
    - "recruiter"
    - "sales"
    - "customer support"
    - "I"
    - "II"

